<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GP Personal Tasks - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <header>
      <h1>GitHub Projects Personal Tasks</h1>
      <p class="subtitle">Settings</p>
    </header>

    <section class="section">
      <h2>Google Tasks Accounts</h2>
      <p class="help-text">
        To add an account, click "Add Account" below. This will open tasks.google.com where your tasks will be automatically synced.
      </p>

      <div id="accountList" class="account-list">
        <div class="empty-state">No accounts synced yet.</div>
      </div>

      <button id="addAccountBtn" class="btn btn-primary">+ Add Account</button>
    </section>

    <section class="section">
      <h2>Sync</h2>
      <button id="syncAllBtn" class="btn btn-secondary">Sync All Accounts</button>
      <span id="syncStatus" class="sync-status"></span>
    </section>

    <section class="section">
      <h2>Display</h2>
      <label class="toggle-label">
        <input type="checkbox" id="showOnBoard" checked>
        Show personal tasks on GitHub Projects board
      </label>
    </section>
  </div>
  <script src="options.js"></script>
</body>
</html>
